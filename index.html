<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Die Reise">
<meta name="theme-color" content="#0a1628">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<title>Die Reise — Vom Ozean ins All</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; cursor: none; font-family: 'Segoe UI', system-ui, sans-serif; }
  canvas { display: block; }
  #cursor {
    position: fixed; pointer-events: none; z-index: 1000;
    width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid rgba(100, 220, 255, 0.6);
    transform: translate(-50%, -50%);
    transition: width 0.8s, height 0.8s, border-color 0.8s, opacity 1.5s;
    box-shadow: 0 0 15px rgba(100, 220, 255, 0.3);
  }
  #cursor.space-mode { width: 6px; height: 6px; opacity: 0.3; border-color: rgba(200,200,255,0.3); box-shadow: none; }
  #progress-track {
    position: fixed; right: 20px; top: 50%; transform: translateY(-50%);
    width: 3px; height: 60vh; border-radius: 2px;
    background: rgba(255,255,255,0.08); z-index: 200;
    opacity: 0.4; transition: opacity 1.5s;
  }
  #progress-track:hover { opacity: 1; }
  #progress-track.hidden { opacity: 0 !important; pointer-events: none; }
  #progress-thumb {
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 9px; height: 9px; border-radius: 50%;
    background: rgba(180, 230, 255, 0.8);
    box-shadow: 0 0 12px rgba(100, 200, 255, 0.5);
    transition: top 0.3s ease;
  }
  .station-dot {
    position: absolute; left: 50%; transform: translateX(-50%);
    width: 5px; height: 5px; border-radius: 50%;
    background: rgba(255,255,255,0.2);
  }
  #scene-title {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: rgba(255,255,255,0); font-size: 38px; font-weight: 200;
    letter-spacing: 10px; text-transform: uppercase; z-index: 100;
    pointer-events: none; transition: opacity 1.5s ease, color 0.8s, top 1s, left 1s, transform 1s, font-size 0.8s;
    text-shadow: 0 0 40px rgba(100, 200, 255, 0.3);
    opacity: 0; text-align: center; line-height: 1.4;
  }
  #scene-title.visible { opacity: 1; color: rgba(220, 240, 255, 0.7); }
  #scene-title.corner { top: auto; left: 30px; bottom: 80px; transform: none; text-align: left; font-size: 22px; letter-spacing: 6px; color: rgba(200, 220, 240, 0.4); text-shadow: 0 0 20px rgba(100, 200, 255, 0.15); }
  #scene-title.corner.visible { opacity: 1; color: rgba(200, 220, 240, 0.4); }
  #scene-title.corner .sub { font-size: 11px; letter-spacing: 3px; opacity: 0.4; }
  #scene-title .sub { display: block; font-size: 14px; letter-spacing: 4px; margin-top: 8px; opacity: 0.5; }
  #scroll-hint {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    color: rgba(100, 200, 255, 0.4); font-size: 13px; letter-spacing: 2px;
    text-transform: uppercase; z-index: 100; transition: opacity 1s;
    animation: scrollPulse 3s ease infinite;
  }
  @keyframes scrollPulse {
    0%,100% { opacity: 0.3; transform: translateX(-50%) translateY(0); }
    50% { opacity: 0.7; transform: translateX(-50%) translateY(-5px); }
  }
  #scroll-hint .arrow { display: block; text-align: center; font-size: 18px; margin-bottom: 4px; }
  /* Audio */
  #audio-zone { position: fixed; bottom: 0; left: 0; right: 0; height: 60px; z-index: 500; opacity: 0; transition: opacity 0.6s ease; cursor: default; }
  #audio-zone:hover { opacity: 1; }
  #audio-panel { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 12px; padding: 10px 20px; border-radius: 30px; background: rgba(5,15,35,0.7); backdrop-filter: blur(12px); border: 1px solid rgba(80,180,255,0.15); }
  #audio-panel button { background: none; border: none; cursor: pointer; color: rgba(120,210,255,0.7); font-size: 18px; transition: color 0.3s; display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; }
  #audio-panel button:hover { color: rgba(160,235,255,1); }
  #track-name { color: rgba(140,220,255,0.6); font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 50px; text-align: center; }
  #a-progress-bar { width: 100px; height: 3px; background: rgba(80,180,255,0.15); border-radius: 2px; overflow: hidden; cursor: pointer; }
  #a-progress-fill { height: 100%; width: 0%; border-radius: 2px; background: linear-gradient(90deg, rgba(80,200,255,0.5), rgba(150,240,255,0.8)); }
  #volume-slider { -webkit-appearance: none; width: 50px; height: 3px; border-radius: 2px; background: rgba(80,180,255,0.2); outline: none; cursor: pointer; }
  #volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; border-radius: 50%; background: rgba(140,230,255,0.7); cursor: pointer; }
  #add-music-btn { position: fixed; top: 15px; right: 15px; z-index: 500; background: rgba(5,15,35,0.5); border: 1px solid rgba(80,180,255,0.15); color: rgba(120,210,255,0.4); font-size: 12px; letter-spacing: 1px; padding: 8px 14px; border-radius: 20px; cursor: pointer; backdrop-filter: blur(8px); transition: all 0.4s ease; opacity: 0; }
  #add-music-btn:hover { opacity: 1 !important; color: rgba(160,235,255,0.9); border-color: rgba(100,200,255,0.4); }
  body:hover #add-music-btn { opacity: 0.5; }
  #file-input { display: none; }
  #track-list { position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%); background: rgba(5,15,35,0.85); backdrop-filter: blur(15px); border: 1px solid rgba(80,180,255,0.15); border-radius: 12px; padding: 8px 0; z-index: 600; display: none; max-height: 250px; overflow-y: auto; min-width: 240px; }
  #track-list.visible { display: block; }
  .track-item { padding: 8px 18px; color: rgba(140,220,255,0.6); font-size: 12px; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; }
  .track-item:hover { background: rgba(60,150,255,0.1); color: rgba(180,240,255,0.9); }
  .track-item.active { color: rgba(180,240,255,1); }
</style>
</head>
<body>
<div id="cursor"></div>
<div id="scene-title"></div>
<div id="scroll-hint"><span class="arrow">&#8593;</span>Scrolle nach oben um aufzusteigen</div>
<div id="progress-track"><div id="progress-thumb"></div></div>
<input type="file" id="file-input" accept="audio/*" multiple>
<button id="add-music-btn" onclick="document.getElementById('file-input').click()">+ Musik</button>
<div id="audio-zone"><div id="audio-panel">
  <button id="btn-prev">&#9198;</button><button id="btn-play">&#9654;</button><button id="btn-next">&#9197;</button>
  <div id="track-name">Keine Musik</div>
  <div id="a-progress-bar"><div id="a-progress-fill"></div></div>
  <button id="btn-list">&#9776;</button>
  <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.7">
</div></div>
<div id="track-list"></div>
<canvas id="c"></canvas>

<script>
// =============================================
//  DIE REISE — VOM OZEAN INS ALL
//  Repetition mit Variation
// =============================================

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const cursorEl = document.getElementById('cursor');
const sceneTitleEl = document.getElementById('scene-title');
const scrollHint = document.getElementById('scroll-hint');
let W, H;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize(); addEventListener('resize', resize);

let mouse = { x: -500, y: -500, px: -500, py: -500 };
let time = 0;

// === MOBILE PERFORMANCE DETECTION ===
const isMobile = /iPad|iPhone|iPod|Android/i.test(navigator.userAgent) || (navigator.maxTouchPoints > 1 && window.innerWidth < 1400);
const PERF = {
  particles:    isMobile ? 100 : 220,
  maxParticles: isMobile ? 150 : 280,
  burstCount:   isMobile ? 12 : 25,
  spaceStars:   isMobile ? 200 : 500,
  ascStars:     isMobile ? 120 : 300,
  jellyfish:    isMobile ? 2 : 4,
  auroraLines:  isMobile ? 3 : 5,
  lightRays:    isMobile ? 3 : 5,
  clouds:       isMobile ? 3 : 6,
  corals:       isMobile ? 6 : 12,
  waveStep:     isMobile ? 8 : 4,
  auroraStep:   isMobile ? 12 : 6,
  useGradientParticles: !isMobile,
  starGlow:     !isMobile,
};
if(isMobile) console.log('[Perf] Mobile mode activated');

// === HELPERS ===
function lerp(a, b, t) { return a + (b - a) * t; }
function lerpColor(c1, c2, t) { return [lerp(c1[0],c2[0],t), lerp(c1[1],c2[1],t), lerp(c1[2],c2[2],t)]; }
function rgb(c, a) { return `rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`; }
function hsl(h, s, l, a) { return `hsla(${h},${s}%,${l}%,${a})`; }
function smoothstep(a, b, t) { t = Math.max(0, Math.min(1, (t - a) / (b - a))); return t * t * (3 - 2 * t); }
// Seeded pseudo-random for deterministic variation per cycle
function seededRand(seed) { let s = seed * 9301 + 49297; s = (s * 233280) | 0; return ((s % 233280) / 233280 + 1) % 1; }

// === JOURNEY STATE ===
let progress = 0, targetProgress = 0;
let spaceMode = false, spaceModeTriggered = false, spaceTime = 0;

// === CYCLE & VARIATION SYSTEM ===
let cycleCount = 0;        // how many full loops through cosmic phases
let totalPhasesVisited = 0; // total individual phases experienced
let discoveries = new Set(); // track what has been "discovered"

// Variation functions — same structure, subtly different each cycle
function cVar(base, range) { return base + Math.sin(cycleCount * 1.618 + base * 0.1) * range; }
function cHueShift() { return cycleCount * 18; } // gentle hue rotation per cycle
function cSizeVar() { return 1 + Math.sin(cycleCount * 0.7) * 0.15; }
function cPosShift(seed) { return Math.sin(cycleCount * 2.1 + seed) * 0.08; } // position shift as fraction of screen

// === ASCENT SCENES ===
const scenes = [
  { name: 'Tiefsee',      range: [0, 0.18] },
  { name: 'Korallenriff', range: [0.18, 0.35] },
  { name: 'Oberfläche',   range: [0.35, 0.52] },
  { name: 'Himmel',       range: [0.52, 0.68] },
  { name: 'Nordlicht',    range: [0.68, 0.84] },
  { name: 'Weltraum',     range: [0.84, 1.0] },
];
let lastScene = -1, titleTimer = 0;
const trackEl = document.getElementById('progress-track');
scenes.forEach(s => { const d = document.createElement('div'); d.className = 'station-dot'; d.style.top = ((s.range[0]+s.range[1])/2*100)+'%'; trackEl.appendChild(d); });
function getCurrentScene() { for (let i = scenes.length-1; i >= 0; i--) { if (progress >= scenes[i].range[0]) return i; } return 0; }


// =============================================
//  PART 1: OCEAN-TO-SPACE ASCENT
// =============================================

const particles = [];
const MAX_P = PERF.maxParticles;

class Particle {
  constructor(x, y, burst) {
    this.x=x??Math.random()*W;this.y=y??Math.random()*H;this.burst=!!burst;
    this.size=0.5+Math.random()*2.5;this.baseSize=this.size;
    this.vx=burst?(Math.random()-.5)*4:(Math.random()-.5)*0.3;
    this.vy=burst?(Math.random()-.5)*4:(Math.random()-.5)*0.2;
    this.life=1;this.maxLife=burst?100+Math.random()*60:Infinity;this.age=0;
    this.pulse=Math.random()*Math.PI*2;this.pulseSpeed=0.02+Math.random()*0.03;
    this.hue=190;this.sat=80;this.light=70;this.alpha=0;this.targetAlpha=0.4+Math.random()*0.4;
    this.wobble=Math.random()*Math.PI*2;this.wobbleSpeed=0.01+Math.random()*0.02;
  }
  update() {
    this.age++;this.pulse+=this.pulseSpeed;this.wobble+=this.wobbleSpeed;
    if(this.alpha<this.targetAlpha)this.alpha+=0.008;
    if(this.burst){this.life=1-this.age/this.maxLife;if(this.life<=0)return false;this.vx*=0.98;this.vy*=0.98;}
    if(!spaceMode){const dx=this.x-mouse.x,dy=this.y-mouse.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<160&&dist>0.1){const f=(1-dist/160)*0.6;this.alpha=Math.min(1,this.alpha+f*0.1);this.size=this.baseSize+f*2.5;const ang=Math.atan2(dy,dx);if(dist>30){this.vx-=Math.cos(ang)*f*0.12;this.vy-=Math.sin(ang)*f*0.12;}else{this.vx+=Math.cos(ang)*f*0.2;this.vy+=Math.sin(ang)*f*0.2;}}else if(dist>=160){this.size+=(this.baseSize-this.size)*0.05;this.alpha+=(this.targetAlpha-this.alpha)*0.01;}}
    else{this.size+=(this.baseSize-this.size)*0.05;this.alpha+=(this.targetAlpha-this.alpha)*0.01;}
    this.vx+=Math.sin(this.wobble)*0.005;this.vy+=Math.cos(this.wobble*0.7)*0.004;
    this.vx+=Math.sin(time*0.0003+this.y*0.002)*0.008;this.vx*=0.98;this.vy*=0.98;
    this.x+=this.vx;this.y+=this.vy;
    if(this.x<-20)this.x+=W+40;if(this.x>W+20)this.x-=W+40;if(this.y<-20)this.y+=H+40;if(this.y>H+20)this.y-=H+40;
    this.adaptToScene();return true;
  }
  adaptToScene() {
    if(spaceMode){this.hue=240+Math.sin(this.pulse)*40;this.sat=30;this.light=80;this.targetAlpha=0.12;this.size=this.baseSize*0.5;return;}
    const p=progress;
    if(p<0.18){this.hue=180+Math.sin(this.pulse)*20;this.sat=80;this.light=65;}
    else if(p<0.35){const t=smoothstep(0.18,0.28,p);this.hue=lerp(185,140+Math.sin(this.pulse*2)*60,t);this.sat=lerp(80,90,t);this.light=lerp(65,70,t);}
    else if(p<0.52){const t=smoothstep(0.35,0.45,p);this.hue=lerp(170,200,t);this.sat=lerp(80,50,t);this.light=lerp(70,85,t);}
    else if(p<0.68){const t=smoothstep(0.52,0.62,p);this.hue=lerp(200,30+Math.sin(this.pulse)*15,t);this.sat=lerp(50,80,t);this.light=lerp(80,70,t);}
    else if(p<0.84){const t=smoothstep(0.68,0.76,p);this.hue=lerp(30,120+Math.sin(this.pulse*1.5)*80,t);this.sat=lerp(80,70,t);this.light=lerp(70,65,t);}
    else{const t=smoothstep(0.84,0.92,p);this.hue=lerp(140,240+Math.sin(this.pulse)*40,t);this.sat=lerp(70,40,t);this.light=lerp(65,80,t);}
  }
  draw() {
    const pf=0.7+Math.sin(this.pulse)*0.3,a=this.alpha*pf*(this.burst?this.life:1);if(a<0.01)return;
    if(PERF.useGradientParticles){
      const gs=this.size*(2.5+pf);const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,gs);
      g.addColorStop(0,hsl(this.hue,this.sat,this.light+10,a*0.5));g.addColorStop(0.5,hsl(this.hue,this.sat,this.light,a*0.15));g.addColorStop(1,hsl(this.hue,this.sat,this.light-10,0));
      ctx.beginPath();ctx.arc(this.x,this.y,gs,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    }
    ctx.beginPath();ctx.arc(this.x,this.y,this.size*pf,0,Math.PI*2);ctx.fillStyle=hsl(this.hue,this.sat-20,Math.min(95,this.light+20),a*0.8);ctx.fill();
  }
}
for(let i=0;i<PERF.particles;i++) particles.push(new Particle());

class Jellyfish {
  constructor(){this.x=Math.random()*W;this.y=Math.random()*H;this.size=25+Math.random()*35;this.phase=Math.random()*Math.PI*2;this.pulseSpeed=0.015+Math.random()*0.01;this.hue=185+Math.random()*40;this.vx=(Math.random()-.5)*0.2;this.vy=-0.15-Math.random()*0.2;this.tentacles=5+Math.floor(Math.random()*4);this.alpha=0;}
  update(){this.phase+=this.pulseSpeed;const tgt=(!spaceMode&&progress<0.4)?0.6*(1-smoothstep(0.3,0.4,progress)):0;this.alpha+=(tgt-this.alpha)*0.02;const p=Math.sin(this.phase);this.vy+=p*0.003-0.001;this.vx+=Math.sin(time*0.0002+this.y*0.003)*0.005;if(!spaceMode){const dx=this.x-mouse.x,dy=this.y-mouse.y,d=Math.sqrt(dx*dx+dy*dy);if(d<200){const f=(1-d/200)*0.3;this.vx+=(dx/d)*f;this.vy+=(dy/d)*f;this.alpha=Math.min(1,this.alpha+0.01);}}this.vx*=0.99;this.vy*=0.99;this.x+=this.vx;this.y+=this.vy;if(this.x<-60)this.x=W+60;if(this.x>W+60)this.x=-60;if(this.y<-60)this.y=H+60;if(this.y>H+60)this.y=-60;}
  draw(){if(this.alpha<0.01)return;const p=Math.sin(this.phase),sq=0.8+p*0.2,a=this.alpha;ctx.save();ctx.translate(this.x,this.y);const bW=this.size*sq,bH=this.size*(1.1-p*0.15);const g=ctx.createRadialGradient(0,-bH*0.2,0,0,0,bW);g.addColorStop(0,hsl(this.hue,80,75,a*0.5));g.addColorStop(0.5,hsl(this.hue,70,55,a*0.2));g.addColorStop(1,hsl(this.hue,60,45,0));ctx.beginPath();ctx.ellipse(0,-bH*0.3,bW,bH*0.6,0,Math.PI,0);ctx.fillStyle=g;ctx.fill();const ig=ctx.createRadialGradient(0,-bH*0.35,0,0,-bH*0.2,bW*0.5);ig.addColorStop(0,hsl(this.hue+10,90,85,a*0.4));ig.addColorStop(1,hsl(this.hue,70,60,0));ctx.beginPath();ctx.ellipse(0,-bH*0.35,bW*0.5,bH*0.35,0,Math.PI,0);ctx.fillStyle=ig;ctx.fill();for(let i=0;i<this.tentacles;i++){const tx=(i/(this.tentacles-1)-0.5)*bW*1.5,tl=this.size*1.3;ctx.beginPath();ctx.moveTo(tx,0);ctx.bezierCurveTo(tx+Math.sin(time*0.001+i*1.3)*15,tl*0.4,tx+Math.sin(time*0.0015+i*0.9)*20,tl*0.7,tx+Math.sin(time*0.002+i*1.1)*12,tl);ctx.strokeStyle=hsl(this.hue+15,80,70,a*0.3);ctx.lineWidth=1.5;ctx.stroke();}ctx.restore();}
}
const jellyfishes=[]; for(let i=0;i<PERF.jellyfish;i++) jellyfishes.push(new Jellyfish());

const ripples=[];
class Ripple{constructor(x,y){this.x=x;this.y=y;this.radius=0;this.maxRadius=180+Math.random()*80;this.life=1;this.speed=2+Math.random();}update(){this.radius+=this.speed;this.life=1-this.radius/this.maxRadius;return this.life>0;}draw(){const h=progress<0.5?190:progress<0.7?35:progress<0.85?140:260;ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.strokeStyle=hsl(h,70,65,this.life*0.35);ctx.lineWidth=2*this.life;ctx.stroke();}}

const ascStars=[];for(let i=0;i<PERF.ascStars;i++) ascStars.push({x:Math.random()*2e3-500,y:Math.random()*2e3-500,size:Math.random()*2,tw:Math.random()*Math.PI*2,sp:0.01+Math.random()*0.03,hue:200+Math.random()*60});

function drawAscentBg(){const p=progress;let c1,c2,c3,c4;if(p<0.18){c1=[10,22,40];c2=[7,18,36];c3=[5,14,30];c4=[3,8,18];}else if(p<0.35){const t=smoothstep(0.18,0.30,p);c1=lerpColor([10,22,40],[15,50,75],t);c2=lerpColor([7,18,36],[10,40,65],t);c3=lerpColor([5,14,30],[8,35,55],t);c4=lerpColor([3,8,18],[5,20,40],t);}else if(p<0.52){const t=smoothstep(0.35,0.50,p);c1=lerpColor([15,50,75],[70,140,200],t);c2=lerpColor([10,40,65],[100,170,220],t);c3=lerpColor([8,35,55],[130,190,230],t);c4=lerpColor([5,20,40],[60,130,190],t);}else if(p<0.68){const t=smoothstep(0.52,0.65,p);c1=lerpColor([70,140,200],[25,20,60],t);c2=lerpColor([100,170,220],[60,40,80],t);c3=lerpColor([130,190,230],[180,90,50],t);c4=lerpColor([60,130,190],[220,130,50],t);}else if(p<0.84){const t=smoothstep(0.68,0.80,p);c1=lerpColor([25,20,60],[5,8,20],t);c2=lerpColor([60,40,80],[10,15,35],t);c3=lerpColor([180,90,50],[8,12,30],t);c4=lerpColor([220,130,50],[5,8,18],t);}else{const t=smoothstep(0.84,0.95,p);c1=lerpColor([5,8,20],[2,3,10],t);c2=lerpColor([10,15,35],[5,5,18],t);c3=lerpColor([8,12,30],[3,4,14],t);c4=lerpColor([5,8,18],[1,1,6],t);}const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,rgb(c1,1));bg.addColorStop(0.33,rgb(c2,1));bg.addColorStop(0.66,rgb(c3,1));bg.addColorStop(1,rgb(c4,1));ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);}

// Shooting stars — appear from cycle 1+
const shootingStars = [];
function maybeSpawnShootingStar() {
  if (cycleCount < 1) return;
  const chance = 0.001 + cycleCount * 0.0003; // more frequent with experience
  if (Math.random() < chance && shootingStars.length < 3) {
    const angle = Math.random() * 0.5 + 0.2;
    shootingStars.push({
      x: Math.random() * W, y: -10,
      vx: Math.cos(angle) * (3 + Math.random() * 4),
      vy: Math.sin(angle) * (3 + Math.random() * 4),
      life: 1, size: 1 + Math.random() * 1.5,
      hue: 180 + Math.random() * 60,
      trail: []
    });
  }
}
function updateDrawShootingStars() {
  for (let i = shootingStars.length - 1; i >= 0; i--) {
    const s = shootingStars[i];
    s.trail.push({ x: s.x, y: s.y });
    if (s.trail.length > 20) s.trail.shift();
    s.x += s.vx; s.y += s.vy;
    s.life -= 0.008;
    if (s.life <= 0 || s.x > W + 50 || s.y > H + 50) { shootingStars.splice(i, 1); continue; }
    // Draw trail
    for (let j = 0; j < s.trail.length; j++) {
      const t = s.trail[j], a = (j / s.trail.length) * s.life * 0.5;
      ctx.beginPath(); ctx.arc(t.x, t.y, s.size * (j / s.trail.length), 0, Math.PI * 2);
      ctx.fillStyle = hsl(s.hue, 40, 90, a); ctx.fill();
    }
    // Head
    ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fillStyle = hsl(s.hue, 20, 98, s.life * 0.8); ctx.fill();
  }
}

// Distant constellations — faint lines between nearby stars, cycle 2+
function drawConstellations() {
  if (cycleCount < 2) return;
  const a = Math.min(0.06, (cycleCount - 1) * 0.015); // slowly more visible
  const phase = cPhase();
  if (phase.type === 'warp' || phase.type === 'void') return;

  // Connect some nearby star pairs
  for (let i = 0; i < spaceStars.length; i += 7) {
    const s1 = spaceStars[i];
    const j = (i + 3 + cycleCount * 2) % spaceStars.length;
    const s2 = spaceStars[j];
    const dx = s1.x - s2.x, dy = s1.y - s2.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 150 && dist > 20) {
      ctx.beginPath(); ctx.moveTo(s1.x, s1.y); ctx.lineTo(s2.x, s2.y);
      ctx.strokeStyle = `rgba(150,180,220,${a})`; ctx.lineWidth = 0.5; ctx.stroke();
    }
  }
}

// Moons around planets — cycle 1+
function drawMoons(px, py, pSize, hue) {
  if (cycleCount < 1) return;
  const numMoons = Math.min(3, cycleCount);
  const pp = cProgress();
  const ee = Math.sin(pp * Math.PI);
  for (let i = 0; i < numMoons; i++) {
    const orbitR = pSize * (1.5 + i * 0.4);
    const speed = 0.0008 + i * 0.0003;
    const angle = spaceTime * speed + i * 2.1 + cycleCount * 0.5;
    const mx = px + Math.cos(angle) * orbitR;
    const my = py + Math.sin(angle) * orbitR * 0.4;
    const mSize = 3 + i * 2;
    const g = ctx.createRadialGradient(mx - 1, my - 1, 0, mx, my, mSize);
    g.addColorStop(0, hsl(hue + 30 + i * 20, 20, 80, ee * 0.7));
    g.addColorStop(1, hsl(hue + 30, 20, 50, 0));
    ctx.beginPath(); ctx.arc(mx, my, mSize, 0, Math.PI * 2);
    ctx.fillStyle = g; ctx.fill();
  }
}

// Distant comet — cycle 2+, appears during drift phases
function drawComet() {
  if (cycleCount < 2) return;
  const ph = cPhase();
  if (ph.type !== 'drift') return;
  const pp = cProgress();
  const a = Math.sin(pp * Math.PI) * 0.6;
  if (a < 0.01) return;

  const cx = W * lerp(1.1, -0.1, pp);
  const cy = H * (0.2 + Math.sin(cycleCount * 1.3) * 0.15);
  const tailLen = 80 + cycleCount * 15;

  // Tail
  const tg = ctx.createLinearGradient(cx, cy, cx + tailLen, cy + tailLen * 0.3);
  tg.addColorStop(0, `rgba(200,230,255,${a * 0.4})`);
  tg.addColorStop(0.3, `rgba(150,200,255,${a * 0.15})`);
  tg.addColorStop(1, 'rgba(100,150,200,0)');
  ctx.beginPath(); ctx.moveTo(cx, cy);
  ctx.quadraticCurveTo(cx + tailLen * 0.5, cy + tailLen * 0.15, cx + tailLen, cy + tailLen * 0.3);
  ctx.quadraticCurveTo(cx + tailLen * 0.5, cy + tailLen * 0.05, cx, cy);
  ctx.fillStyle = tg; ctx.fill();

  // Head
  const hg = ctx.createRadialGradient(cx, cy, 0, cx, cy, 8);
  hg.addColorStop(0, `rgba(255,255,255,${a})`);
  hg.addColorStop(0.5, `rgba(180,220,255,${a * 0.4})`);
  hg.addColorStop(1, 'rgba(100,150,255,0)');
  ctx.beginPath(); ctx.arc(cx, cy, 8, 0, Math.PI * 2);
  ctx.fillStyle = hg; ctx.fill();
}

// Distant pulsar beacon — cycle 3+, appears during void phases
function drawPulsar() {
  if (cycleCount < 3) return;
  const ph = cPhase();
  if (ph.type !== 'void') return;
  const pp = cProgress();
  const visible = Math.sin(pp * Math.PI);
  if (visible < 0.01) return;

  const px = W * 0.5 + Math.sin(cycleCount * 2.7) * W * 0.3;
  const py = H * 0.4 + Math.cos(cycleCount * 1.9) * H * 0.2;
  const pulse = Math.sin(spaceTime * 0.05) * 0.5 + 0.5; // fast pulse
  const a = visible * pulse * 0.5;

  // Beacon beam
  ctx.save();
  ctx.translate(px, py);
  ctx.rotate(spaceTime * 0.003);
  const bg = ctx.createLinearGradient(0, 0, 200, 0);
  bg.addColorStop(0, `rgba(200,220,255,${a * 0.3})`);
  bg.addColorStop(1, 'rgba(100,150,255,0)');
  ctx.fillStyle = bg;
  ctx.fillRect(0, -2, 200, 4);
  ctx.fillRect(0, -2, -200, 4); // opposite beam
  ctx.restore();

  // Core
  const cg = ctx.createRadialGradient(px, py, 0, px, py, 6);
  cg.addColorStop(0, `rgba(255,255,255,${a})`);
  cg.addColorStop(1, 'rgba(150,180,255,0)');
  ctx.beginPath(); ctx.arc(px, py, 6, 0, Math.PI * 2);
  ctx.fillStyle = cg; ctx.fill();
}

// Asteroid field — cycle 2+, subtle floating rocks near planets
function drawAsteroids(px, py, pSize) {
  if (cycleCount < 2) return;
  const pp = cProgress();
  const ee = Math.sin(pp * Math.PI);
  if (ee < 0.05) return;
  const count = 8 + cycleCount * 3;
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2 + spaceTime * 0.0002 + i * 0.7;
    const dist = pSize * (1.8 + Math.sin(i * 2.3) * 0.5 + cycleCount * 0.1);
    const ax = px + Math.cos(angle) * dist;
    const ay = py + Math.sin(angle) * dist * 0.35;
    const as = 1 + Math.sin(i * 5.1) * 0.8;
    ctx.beginPath(); ctx.arc(ax, ay, as, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(150,140,130,${ee * 0.3})`; ctx.fill();
  }
}

// Rare event: Meteor shower — random chance each phase, cycle 1+
let meteorShower = { active: false, particles: [], timer: 0 };
function maybeTriggerMeteorShower() {
  if (cycleCount < 1 || meteorShower.active) return;
  if (Math.random() < 0.003) { // rare!
    meteorShower.active = true;
    meteorShower.timer = 300; // ~5 seconds
    meteorShower.particles = [];
  }
}
function updateDrawMeteorShower() {
  if (!meteorShower.active) return;
  meteorShower.timer--;
  if (meteorShower.timer <= 0) { meteorShower.active = false; return; }
  // Spawn
  if (Math.random() < 0.3) {
    meteorShower.particles.push({
      x: Math.random() * W, y: -5,
      vx: -1.5 + Math.random() * 0.5, vy: 4 + Math.random() * 3,
      life: 1, size: 0.5 + Math.random()
    });
  }
  // Update & draw
  for (let i = meteorShower.particles.length - 1; i >= 0; i--) {
    const m = meteorShower.particles[i];
    m.x += m.vx; m.y += m.vy; m.life -= 0.015;
    if (m.life <= 0 || m.y > H + 10) { meteorShower.particles.splice(i, 1); continue; }
    ctx.beginPath(); ctx.moveTo(m.x, m.y);
    ctx.lineTo(m.x - m.vx * 5, m.y - m.vy * 5);
    ctx.strokeStyle = `rgba(200,220,255,${m.life * 0.4})`; ctx.lineWidth = m.size; ctx.stroke();
  }
}

// === COSMIC SCENE RENDERERS (with variation) ===

function cPhase() { return cosmicPhases[cosmicIdx % cosmicPhases.length]; }
function cProgress() { return Math.min(1, cosmicTime / (cPhase().dur * 60)); }

function drawSpaceBg() {
  const ph = cPhase();
  const hShift = cHueShift() * 0.3;
  const bg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.8);
  if (ph.type === 'void') {
    const v = 2 + Math.sin(cycleCount * 1.2) * 1;
    bg.addColorStop(0, `rgb(${v},${v},${v+3})`); bg.addColorStop(1, 'rgb(0,0,1)');
  } else if (ph.type === 'warp') {
    bg.addColorStop(0, 'rgb(5,5,20)'); bg.addColorStop(1, 'rgb(1,1,8)');
  } else {
    const r = 3 + Math.sin(cycleCount * 0.8) * 1;
    bg.addColorStop(0, `rgb(${r},${r+1},${r+9})`);
    bg.addColorStop(0.5, `rgb(${r-1},${r},${r+7})`);
    bg.addColorStop(1, `rgb(1,1,${3+cycleCount%3})`);
  }
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);
}

function drawSpaceStars() {
  const ph = cPhase(), isWarp = ph.type==='warp', wI = isWarp ? Math.sin(cProgress()*Math.PI) : 0, isVoid = ph.type==='void';
  spaceStars.forEach(s => {
    s.tw += s.twSp;
    if (!isWarp) { s.x -= 0.05*(1+s.z*0.5); s.y -= 0.02*s.z; if(s.x<-10)s.x+=W+20; if(s.y<-10)s.y+=H+20; }
    const tw = 0.5+Math.sin(s.tw)*0.5; let a = s.br * tw * (isVoid ? 0.15 : 0.7);
    if (isWarp) {
      const cx=W/2,cy=H/2,dx=s.x-cx,dy=s.y-cy,ang=Math.atan2(dy,dx),dist=Math.sqrt(dx*dx+dy*dy);
      ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x+Math.cos(ang)*wI*dist*0.5,s.y+Math.sin(ang)*wI*dist*0.5);
      ctx.strokeStyle=hsl(s.hue+cHueShift()*0.2,30,90,a*wI*1.5);ctx.lineWidth=s.size*0.8;ctx.stroke();
      s.x+=Math.cos(ang)*wI*3*(1+s.z);s.y+=Math.sin(ang)*wI*3*(1+s.z);
      if(s.x<-50||s.x>W+50||s.y<-50||s.y>H+50){s.x=W/2+(Math.random()-.5)*100;s.y=H/2+(Math.random()-.5)*100;}
    }
    if(PERF.starGlow&&s.size>1.3&&!isVoid){const g=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.size*3);g.addColorStop(0,hsl(s.hue,25,90,a*0.25));g.addColorStop(1,hsl(s.hue,25,80,0));ctx.beginPath();ctx.arc(s.x,s.y,s.size*3,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();}
    ctx.beginPath();ctx.arc(s.x,s.y,isWarp?s.size*0.5:s.size,0,Math.PI*2);ctx.fillStyle=hsl(s.hue,20,95,a);ctx.fill();
  });
}

function drawPlanet(ph) {
  const pp=cProgress(), ee=Math.sin(pp*Math.PI); if(ee<0.01)return;
  // VARIATION: position, size, hue shift each cycle
  const hue = ph.baseHue + cHueShift();
  const pSizeFactor = ph.basePSize * cSizeVar();
  const posOffX = cPosShift(1); const posOffY = cPosShift(2);
  // Direction alternates: sometimes from left, sometimes from right
  const fromLeft = cycleCount % 3 === 1;
  const pS = Math.min(W,H) * pSizeFactor * ee;
  const px = fromLeft ? W * lerp(-0.2, 0.65, pp) + W * posOffX : W * lerp(1.2, 0.35, pp) + W * posOffX;
  const py = H * lerp(0.6, 0.45, pp) + H * posOffY;

  const g=ctx.createRadialGradient(px-pS*0.25,py-pS*0.2,pS*0.1,px,py,pS);
  g.addColorStop(0,hsl(hue,50,55,ee*0.9));g.addColorStop(0.5,hsl(hue+15,45,35,ee*0.8));g.addColorStop(0.85,hsl(hue+30,40,15,ee*0.7));g.addColorStop(1,hsl(hue+30,30,5,0));
  ctx.beginPath();ctx.arc(px,py,pS,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  // Atmosphere
  const atm=ctx.createRadialGradient(px,py,pS*0.9,px,py,pS*1.3);atm.addColorStop(0,hsl(hue-10,60,60,0));atm.addColorStop(0.5,hsl(hue-10,60,60,ee*0.08));atm.addColorStop(1,hsl(hue-10,50,50,0));ctx.beginPath();ctx.arc(px,py,pS*1.3,0,Math.PI*2);ctx.fillStyle=atm;ctx.fill();
  // Cloud bands — shift with cycle
  ctx.save();ctx.globalAlpha=ee*0.15;for(let i=0;i<6;i++){const by=py-pS*0.6+(i/5)*pS*1.2,bw=Math.sqrt(Math.max(0,pS*pS-(by-py)*(by-py)));if(bw<5)continue;ctx.beginPath();ctx.ellipse(px+Math.sin(spaceTime*0.0003+i+cycleCount)*5,by,bw*0.9,pS*0.04,0,0,Math.PI*2);ctx.fillStyle=hsl(hue+i*8+cycleCount*5,40,50+i*3,0.5);ctx.fill();}ctx.restore();
  // Rings (sometimes new rings appear on previously ringless planets in later cycles)
  const hasRings = ph.rings || (cycleCount >= 3 && seededRand(ph.baseHue + cycleCount) > 0.6);
  if(hasRings){ctx.save();ctx.translate(px,py);ctx.scale(1,0.3);for(let r=0;r<3;r++){const ri=pS*(1.4+r*0.2);ctx.beginPath();ctx.arc(0,0,ri,0,Math.PI*2);ctx.strokeStyle=hsl(hue+20,30,65,ee*(0.2-r*0.05));ctx.lineWidth=pS*0.12;ctx.stroke();}ctx.restore();}
  // Moons & asteroids — discoveries
  drawMoons(px, py, pS, hue);
  drawAsteroids(px, py, pS);
}

function drawCosmicNebula(ph) {
  const pp=cProgress(), a=Math.sin(pp*Math.PI); if(a<0.01)return;
  const h1 = ph.baseHue1 + cHueShift(), h2 = ph.baseHue2 + cHueShift();
  // More clouds and filaments accumulate with cycles
  const cloudCount = 8 + Math.min(4, cycleCount);
  ctx.globalCompositeOperation='screen';
  for(let i=0;i<cloudCount;i++){
    const phaseOff = cycleCount * 0.3 + i * 0.1; // position shifts per cycle
    const nx=W*(0.2+Math.sin(spaceTime*0.00015+i*1.1+phaseOff)*0.3);
    const ny=H*(0.3+Math.cos(spaceTime*0.0001+i*0.8+phaseOff)*0.2);
    const ns=100+Math.sin(i*2.3+cycleCount)*60+80;
    const nh=lerp(h1,h2,(i/cloudCount+Math.sin(spaceTime*0.0002))*0.5+0.25);
    const g=ctx.createRadialGradient(nx,ny,0,nx,ny,ns);
    g.addColorStop(0,hsl(nh,70,55,a*0.12));g.addColorStop(0.3,hsl(nh+15,60,45,a*0.06));
    g.addColorStop(0.7,hsl(nh+30,50,35,a*0.02));g.addColorStop(1,hsl(nh,40,30,0));
    ctx.beginPath();ctx.arc(nx,ny,ns,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  }
  // Filaments — direction changes with cycle
  const filDir = cycleCount % 2 === 0 ? 1 : -1;
  for(let i=0;i<4;i++){ctx.beginPath();const sx=Math.sin(i*2.7+spaceTime*0.00008*filDir+cycleCount)*W*0.3+W*0.5;ctx.moveTo(sx,0);for(let y=0;y<=H;y+=8){ctx.lineTo(sx+Math.sin(y*0.005*filDir+spaceTime*0.0002+i)*150+Math.sin(y*0.01+i*3+cycleCount)*50,y);}ctx.strokeStyle=hsl(h1+i*20,50,50,a*0.04);ctx.lineWidth=20+Math.sin(i)*10;ctx.stroke();}
  ctx.globalCompositeOperation='source-over';
}

function drawGalaxy() {
  const pp=cProgress(), a=Math.sin(pp*Math.PI); if(a<0.01)return;
  // VARIATION: approach from different angles, different tilt
  const gx=W*lerp(cycleCount%2===0?0.7:0.3, cycleCount%2===0?0.4:0.6, pp);
  const gy=H*(0.45+cPosShift(3)*0.5);
  const gS=Math.min(W,H)*(0.3*cSizeVar());
  const tilt = 0.45 + Math.sin(cycleCount * 0.8) * 0.15; // arm tilt varies

  ctx.save();ctx.translate(gx,gy);ctx.rotate(spaceTime*0.00005+cycleCount*0.5);ctx.globalCompositeOperation='screen';
  const core=ctx.createRadialGradient(0,0,0,0,0,gS*0.3);core.addColorStop(0,`rgba(255,240,200,${a*0.25})`);core.addColorStop(0.5,`rgba(200,180,150,${a*0.08})`);core.addColorStop(1,'rgba(150,130,100,0)');ctx.beginPath();ctx.arc(0,0,gS*0.3,0,Math.PI*2);ctx.fillStyle=core;ctx.fill();
  const armCount = 2 + (cycleCount >= 2 ? 1 : 0); // third arm appears cycle 2+
  for(let arm=0;arm<armCount;arm++){const ao=arm*(Math.PI*2/armCount);for(let i=0;i<300;i++){const t=i/300,ang=t*Math.PI*3+ao+spaceTime*0.00003,r=t*gS,sp=(10+t*30)*(0.5+Math.sin(i*0.3)*0.5);
  ctx.beginPath();ctx.arc(Math.cos(ang)*r+(Math.random()-.5)*sp,Math.sin(ang)*r*tilt+(Math.random()-.5)*sp*tilt,(1-t*0.5)*1.5*a,0,Math.PI*2);ctx.fillStyle=hsl(lerp(40+cHueShift()*0.5,220+cHueShift()*0.3,t),40,80,a*(0.3+(1-t)*0.3));ctx.fill();}}
  ctx.globalCompositeOperation='source-over';ctx.restore();
}

function drawBinaryStar() {
  const pp=cProgress(), a=Math.sin(pp*Math.PI); if(a<0.01)return;
  const cx=W*0.5+W*cPosShift(4),cy=H*0.45;
  // VARIATION: orbit size and star properties change
  const oR=(80+Math.sin(pp*Math.PI)*20)*cSizeVar();
  const ang=spaceTime*(0.001+cycleCount*0.0001); // slightly faster each cycle
  const hues = [40+cHueShift(), 200+cHueShift()];
  const sizes = [50*cSizeVar(), 35*cSizeVar()];
  const ss=[{x:cx+Math.cos(ang)*oR,y:cy+Math.sin(ang)*oR*0.5,s:sizes[0],h:hues[0],l:85},{x:cx-Math.cos(ang)*oR,y:cy-Math.sin(ang)*oR*0.5,s:sizes[1],h:hues[1],l:80}];
  ctx.beginPath();ctx.moveTo(ss[0].x,ss[0].y);ctx.lineTo(ss[1].x,ss[1].y);ctx.strokeStyle=`rgba(255,220,180,${a*0.03})`;ctx.lineWidth=15;ctx.stroke();
  ctx.globalCompositeOperation='screen';
  ss.forEach(s=>{for(let r=3;r>=1;r--){const g=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.s*r*1.5);g.addColorStop(0,hsl(s.h,60,s.l,a*0.08/r));g.addColorStop(1,hsl(s.h,50,60,0));ctx.beginPath();ctx.arc(s.x,s.y,s.s*r*1.5,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();}
  const g=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.s);g.addColorStop(0,hsl(s.h,30,98,a*0.8));g.addColorStop(0.3,hsl(s.h,50,s.l,a*0.5));g.addColorStop(1,hsl(s.h,60,60,0));ctx.beginPath();ctx.arc(s.x,s.y,s.s,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();});
  ctx.globalCompositeOperation='source-over';
}

function drawRedStar() {
  const pp=cProgress(), a=Math.sin(pp*Math.PI); if(a<0.01)return;
  // VARIATION: approach side alternates, color temperature shifts
  const fromRight = cycleCount % 2 === 0;
  const sx = fromRight ? W*lerp(1.3,0.3,pp) : W*lerp(-0.3,0.7,pp);
  const sy=H*(0.5+cPosShift(5)*0.3);
  const sz=Math.min(W,H)*0.2*cSizeVar();
  const hue = 10 + cycleCount * 5; // gets slightly oranger over time
  ctx.globalCompositeOperation='screen';
  for(let r=4;r>=1;r--){const g=ctx.createRadialGradient(sx,sy,0,sx,sy,sz*r*1.2);g.addColorStop(0,hsl(hue,80,50,a*0.06/r));g.addColorStop(0.5,hsl(hue-10,70,35,a*0.02/r));g.addColorStop(1,'rgba(100,10,0,0)');ctx.beginPath();ctx.arc(sx,sy,sz*r*1.2,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();}
  const g=ctx.createRadialGradient(sx,sy,0,sx,sy,sz);g.addColorStop(0,`rgba(255,200,150,${a*0.7})`);g.addColorStop(0.2,`rgba(255,100,30,${a*0.5})`);g.addColorStop(0.6,`rgba(200,40,10,${a*0.3})`);g.addColorStop(1,'rgba(100,10,0,0)');ctx.beginPath();ctx.arc(sx,sy,sz,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  ctx.globalCompositeOperation='source-over';
}

function drawSupernova() {
  const pp=cProgress(), a=Math.sin(pp*Math.PI); if(a<0.01)return;
  // VARIATION: explosion center shifts, colors rotate
  const sx=W*(0.5+cPosShift(6)*0.5), sy=H*(0.5+cPosShift(7)*0.3);
  const ep=smoothstep(0,0.4,pp), mR=Math.min(W,H)*0.4*cSizeVar(), r=ep*mR;
  ctx.globalCompositeOperation='screen';
  const cols = [[255,100+cycleCount*10,50],[50,150,255],[200+cycleCount*8,50,255],[255,200,50+cycleCount*15]];
  cols.forEach((col,i)=>{const ri=r*(0.7+i*0.1),th=30+i*10;
  const g=ctx.createRadialGradient(sx,sy,Math.max(0,ri-th),sx,sy,ri+th);g.addColorStop(0,rgb(col,0));g.addColorStop(0.4,rgb(col,a*0.06));g.addColorStop(0.6,rgb(col,a*0.08));g.addColorStop(1,rgb(col,0));ctx.beginPath();ctx.arc(sx,sy,ri+th,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();});
  const fA=a*(1-ep)*2;if(fA>0.01){const fg=ctx.createRadialGradient(sx,sy,0,sx,sy,60);fg.addColorStop(0,`rgba(255,255,255,${Math.min(1,fA)})`);fg.addColorStop(0.3,`rgba(200,220,255,${fA*0.3})`);fg.addColorStop(1,'rgba(100,150,255,0)');ctx.beginPath();ctx.arc(sx,sy,60,0,Math.PI*2);ctx.fillStyle=fg;ctx.fill();}
  // More filaments each cycle
  const filCount = 12 + cycleCount * 2;
  for(let i=0;i<filCount;i++){const ang=(i/filCount)*Math.PI*2+spaceTime*0.0001+cycleCount*0.3,len=r*(0.8+Math.sin(i*3.7+cycleCount)*0.3);ctx.beginPath();ctx.moveTo(sx,sy);ctx.quadraticCurveTo(sx+Math.cos(ang+0.2)*len*0.5,sy+Math.sin(ang+0.2)*len*0.5,sx+Math.cos(ang)*len,sy+Math.sin(ang)*len);ctx.strokeStyle=hsl(i*30+cHueShift(),70,60,a*0.08);ctx.lineWidth=3;ctx.stroke();}
  ctx.globalCompositeOperation='source-over';
}

function drawCluster() {
  const pp=cProgress(), a=Math.sin(pp*Math.PI); if(a<0.01)return;
  // VARIATION: density increases, position shifts
  const cx=W*lerp(cycleCount%2===0?0.7:0.3, cycleCount%2===0?0.45:0.55, pp)+W*cPosShift(8);
  const cy=H*(0.45+cPosShift(9)*0.2);
  const cR=Math.min(W,H)*0.25*cSizeVar();
  const starCount = 200 + cycleCount * 30; // more stars discovered each time
  ctx.globalCompositeOperation='screen';
  const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,cR*0.5);cg.addColorStop(0,`rgba(255,240,200,${a*0.1})`);cg.addColorStop(1,'rgba(200,180,140,0)');ctx.beginPath();ctx.arc(cx,cy,cR*0.5,0,Math.PI*2);ctx.fillStyle=cg;ctx.fill();
  for(let i=0;i<starCount;i++){const ang=i*2.399+cycleCount*0.1,r=Math.sqrt(i/starCount)*cR,j=Math.sin(i*7.3)*15;const sx=cx+Math.cos(ang)*(r+j),sy=cy+Math.sin(ang)*(r+j),sz=(1-r/cR)*2.5+0.5,sh=lerp(30+cHueShift()*0.3,220+cHueShift()*0.2,r/cR);
  if(sz>1.5){const sg=ctx.createRadialGradient(sx,sy,0,sx,sy,sz*3);sg.addColorStop(0,hsl(sh,30,90,a*0.15));sg.addColorStop(1,hsl(sh,30,80,0));ctx.beginPath();ctx.arc(sx,sy,sz*3,0,Math.PI*2);ctx.fillStyle=sg;ctx.fill();}
  ctx.beginPath();ctx.arc(sx,sy,sz,0,Math.PI*2);ctx.fillStyle=hsl(sh,25,90,a*0.6*(1-r/cR*0.5));ctx.fill();}
  ctx.globalCompositeOperation='source-over';
}

function drawWarpOverlay() {
  const pp=cProgress(), intensity=Math.sin(pp*Math.PI);
  // VARIATION: warp color shifts
  const wHue = 220 + cHueShift() * 0.5;
  ctx.globalCompositeOperation='screen';const cx=W/2,cy=H/2;
  const lineCount = 40 + cycleCount * 5; // more dramatic each cycle
  for(let i=0;i<lineCount;i++){const ang=(i/lineCount)*Math.PI*2+spaceTime*0.002,iR=50+Math.sin(i*3)*30,oR=Math.max(W,H);
  const x1=cx+Math.cos(ang)*iR,y1=cy+Math.sin(ang)*iR,x2=cx+Math.cos(ang)*oR,y2=cy+Math.sin(ang)*oR;
  const g=ctx.createLinearGradient(x1,y1,x2,y2);g.addColorStop(0,hsl(wHue,50,80,intensity*0.15));g.addColorStop(0.3,hsl(wHue+20,40,70,intensity*0.05));g.addColorStop(1,'rgba(50,100,200,0)');
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.strokeStyle=g;ctx.lineWidth=1.5+intensity;ctx.stroke();}
  const fg=ctx.createRadialGradient(cx,cy,0,cx,cy,100);fg.addColorStop(0,hsl(wHue,30,95,intensity*0.15));fg.addColorStop(1,'rgba(100,150,255,0)');ctx.beginPath();ctx.arc(cx,cy,100,0,Math.PI*2);ctx.fillStyle=fg;ctx.fill();
  ctx.globalCompositeOperation='source-over';
}

function updateSpaceJourney() {
  spaceTime++; cosmicTime++;
  const ph = cPhase();
  if(!cosmicTitleShown && cosmicTime < 120 && ph.name){
    cosmicTitleShown = true;

    // Track warp encounters
    if (ph.type === 'warp') warpCount++;

    // Decide whether to show a title
    const skipTitle = cycleCount >= 3                  // Cycle 3+: pure immersion, no titles
      || (ph.type === 'warp' && warpCount > 1);       // Warp: only the very first time ever

    if (!skipTitle) {
      const sub = ph.type === 'warp' ? '' : getSubtitle(ph.name);
      const displayName = cycleCount === 0 ? ph.name :
        (ph.type === 'drift' ? ['Unendliche Stille', 'Vertraute Stille', 'Neue Stille', 'Tiefere Stille', 'Ewige Stille'][cycleCount % 5] : ph.name);

      // Cycle 2: titles move to bottom-left corner, quieter
      if (cycleCount >= 2) {
        sceneTitleEl.classList.add('corner');
      } else {
        sceneTitleEl.classList.remove('corner');
      }

      sceneTitleEl.innerHTML = displayName + (sub ? `<span class="sub">${sub}</span>` : '');
      sceneTitleEl.classList.add('visible');
      clearTimeout(titleTimer);
      titleTimer = setTimeout(() => sceneTitleEl.classList.remove('visible'), cycleCount >= 2 ? 2500 : 3500);
    }
  }
  if(cosmicTime >= ph.dur * 60){
    cosmicTime = 0; cosmicIdx++; cosmicTitleShown = false;
    totalPhasesVisited++;
    // Track cycle completion
    if (cosmicIdx % cosmicPhases.length === 0) {
      cycleCount++;
    }
  }
  // Spawn discovery objects
  maybeSpawnShootingStar();
  maybeTriggerMeteorShower();
}

function drawSpaceScene() {
  drawSpaceBg(); drawSpaceStars();
  drawConstellations();
  const ph = cPhase();
  switch(ph.type){
    case 'planet': drawPlanet(ph); break;
    case 'nebula': drawCosmicNebula(ph); break;
    case 'warp': drawWarpOverlay(); break;
    case 'galaxy': drawGalaxy(); break;
    case 'binary_star': drawBinaryStar(); break;
    case 'red_star': drawRedStar(); break;
    case 'supernova': drawSupernova(); break;
    case 'cluster': drawCluster(); break;
  }
  // Discovery layers
  drawComet();
  drawPulsar();
  updateDrawShootingStars();
  updateDrawMeteorShower();
}

addEventListener('wheel', e => { if(spaceMode)return;e.preventDefault();targetProgress=Math.max(0,Math.min(1,targetProgress-e.deltaY*0.0004)); }, { passive: false });
addEventListener('touchmove', e => {e.preventDefault();const t=e.touches[0];mouse.px=mouse.x;mouse.py=mouse.y;mouse.x=t.clientX;mouse.y=t.clientY;},{passive:false});
let touchStartY=0;
addEventListener('touchstart', e=>{touchStartY=e.touches[0].clientY;mouse.x=e.touches[0].clientX;mouse.y=e.touches[0].clientY;});
addEventListener('touchend', e=>{if(spaceMode)return;const dy=(e.changedTouches[0]?.clientY||0)-touchStartY;targetProgress=Math.max(0,Math.min(1,targetProgress+dy*0.001));});
addEventListener('keydown', e => {
  if(!spaceMode){if(e.code==='ArrowUp'){e.preventDefault();targetProgress=Math.min(1,targetProgress+0.03);}if(e.code==='ArrowDown'){e.preventDefault();targetProgress=Math.max(0,targetProgress-0.03);}}
  if(e.code==='Space'){e.preventDefault();togglePlay();}
  if(e.code==='ArrowRight') nextTrack();if(e.code==='ArrowLeft') prevTrack();
});

function updateSceneTitle() { if(spaceMode)return;const si=getCurrentScene();if(si!==lastScene){lastScene=si;sceneTitleEl.innerHTML=scenes[si].name;sceneTitleEl.classList.add('visible');clearTimeout(titleTimer);titleTimer=setTimeout(()=>sceneTitleEl.classList.remove('visible'),2500);} }

function animate() {
  time++;
  progress += (targetProgress - progress) * 0.03;
  if(progress > 0.97 && !spaceModeTriggered){spaceModeTriggered=true;setTimeout(()=>{spaceMode=true;cursorEl.classList.add('space-mode');document.getElementById('progress-track').classList.add('hidden');scrollHint.style.display='none';},2000);}

  if(!spaceMode){
    document.getElementById('progress-thumb').style.top=(progress*100)+'%';
    if(progress>0.02)scrollHint.style.opacity='0';
    updateSceneTitle();updateCursorAscent();
    drawAscentBg();drawLightRays();drawCorals();drawAscentStars();drawAscentNebula();drawAurora();drawSunset();drawClouds();drawWaves();
    for(let i=particles.length-1;i>=0;i--){if(!particles[i].update())particles.splice(i,1);}
    particles.forEach(p=>p.draw());
    jellyfishes.forEach(j=>{j.update();j.draw();});
    for(let i=ripples.length-1;i>=0;i--){if(!ripples[i].update())ripples.splice(i,1);else ripples[i].draw();}
    if(Math.random()<(isMobile?0.1:0.25)){const sp=Math.sqrt((mouse.x-mouse.px)**2+(mouse.y-mouse.py)**2);if(sp>3&&particles.length<MAX_P){const p=new Particle(mouse.x+(Math.random()-.5)*15,mouse.y+(Math.random()-.5)*15,true);p.alpha=0.5;p.targetAlpha=0.5;p.maxLife=70;particles.push(p);}}
    if(progress>0.93){const bl=smoothstep(0.93,0.99,progress);ctx.fillStyle=`rgba(2,3,10,${bl*0.5})`;ctx.fillRect(0,0,W,H);}
  } else {
    updateSpaceJourney();drawSpaceScene();
    for(let i=particles.length-1;i>=0;i--){if(!particles[i].update())particles.splice(i,1);}
    particles.forEach(p=>p.draw());
  }

  const vig=ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.9);
  vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,`rgba(0,0,0,${spaceMode?0.45:0.4+progress*0.15})`);
  ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);
  requestAnimationFrame(animate);
}
animate();


// ========== AUDIO (PWA — random track selection from tracks.json) ==========
const audioSys = { tracks: [], shuffled: [], idx: -1, audio: new Audio(), playing: false };
audioSys.audio.volume = 0.7;
audioSys.audio.addEventListener('ended', nextTrack);
audioSys.audio.addEventListener('timeupdate', () => {
  if (audioSys.audio.duration)
    document.getElementById('a-progress-fill').style.width =
      (audioSys.audio.currentTime / audioSys.audio.duration * 100) + '%';
});

// Fisher-Yates shuffle
function shuffleTracks() {
  audioSys.shuffled = audioSys.tracks.map((_, i) => i);
  for (let i = audioSys.shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [audioSys.shuffled[i], audioSys.shuffled[j]] = [audioSys.shuffled[j], audioSys.shuffled[i]];
  }
}

// Load tracks from tracks.json, then also allow drag-drop additions
fetch('tracks.json')
  .then(r => r.json())
  .then(trackPaths => {
    trackPaths.forEach(p => {
      const name = p.split('/').pop().replace(/\.[^/.]+$/, '')
        .replace(/[-_]/g, ' ').replace(/track\s*/i, 'Track ');
      audioSys.tracks.push({ name, url: p });
    });
    shuffleTracks();
    renderTracks();
    // Auto-load first random track (plays on user interaction)
    if (audioSys.tracks.length) loadTrack(audioSys.shuffled[0]);
    // Tell service worker to pre-cache all music
    if (navigator.serviceWorker && navigator.serviceWorker.controller) {
      navigator.serviceWorker.controller.postMessage({
        type: 'CACHE_MUSIC', tracks: trackPaths
      });
    }
  })
  .catch(() => console.log('No tracks.json found — use drag & drop or + Musik'));

// Also support file input / drag-drop for additional tracks
document.getElementById('file-input').addEventListener('change', e => {
  Array.from(e.target.files).forEach(f => {
    if (f.type.startsWith('audio/'))
      audioSys.tracks.push({ name: f.name.replace(/\.[^/.]+$/, ''), url: URL.createObjectURL(f) });
  });
  shuffleTracks(); renderTracks();
  if (audioSys.idx === -1 && audioSys.tracks.length) { loadTrack(0); playAudio(); }
  e.target.value = '';
});

function loadTrack(i) {
  if (i < 0 || i >= audioSys.tracks.length) return;
  audioSys.idx = i;
  audioSys.audio.src = audioSys.tracks[i].url;
  document.getElementById('track-name').textContent = audioSys.tracks[i].name;
  renderTracks();
}

function playAudio() {
  if (!audioSys.tracks.length) return;
  audioSys.audio.play().catch(() => {});  // catch autoplay block
  audioSys.playing = true;
  document.getElementById('btn-play').innerHTML = '&#9208;';
}

function pauseAudio() {
  audioSys.audio.pause();
  audioSys.playing = false;
  document.getElementById('btn-play').innerHTML = '&#9654;';
}

function togglePlay() {
  if (!audioSys.tracks.length) { document.getElementById('file-input').click(); return; }
  audioSys.playing ? pauseAudio() : playAudio();
}

function nextTrack() {
  if (!audioSys.tracks.length) return;
  // Find current position in shuffle order and advance
  let sIdx = audioSys.shuffled.indexOf(audioSys.idx);
  sIdx = (sIdx + 1) % audioSys.shuffled.length;
  // Re-shuffle when completing a full cycle
  if (sIdx === 0) shuffleTracks();
  loadTrack(audioSys.shuffled[sIdx]);
  playAudio();
}

function prevTrack() {
  if (!audioSys.tracks.length) return;
  if (audioSys.audio.currentTime > 3) { audioSys.audio.currentTime = 0; return; }
  let sIdx = audioSys.shuffled.indexOf(audioSys.idx);
  sIdx = (sIdx - 1 + audioSys.shuffled.length) % audioSys.shuffled.length;
  loadTrack(audioSys.shuffled[sIdx]);
  playAudio();
}

function renderTracks() {
  const l = document.getElementById('track-list');
  l.innerHTML = '';
  audioSys.tracks.forEach((t, i) => {
    const d = document.createElement('div');
    d.className = 'track-item' + (i === audioSys.idx ? ' active' : '');
    d.textContent = (i + 1) + '. ' + t.name;
    d.onclick = () => { loadTrack(i); playAudio(); l.classList.remove('visible'); };
    l.appendChild(d);
  });
}

document.getElementById('btn-play').onclick = togglePlay;
document.getElementById('btn-next').onclick = nextTrack;
document.getElementById('btn-prev').onclick = prevTrack;
document.getElementById('volume-slider').oninput = e => audioSys.audio.volume = +e.target.value;
document.getElementById('a-progress-bar').onclick = e => {
  if (!audioSys.audio.duration) return;
  const r = e.target.getBoundingClientRect();
  audioSys.audio.currentTime = ((e.clientX - r.left) / r.width) * audioSys.audio.duration;
};
document.getElementById('btn-list').onclick = () =>
  document.getElementById('track-list').classList.toggle('visible');
document.addEventListener('click', e => {
  if (!e.target.closest('#track-list,#btn-list'))
    document.getElementById('track-list').classList.remove('visible');
});
addEventListener('dragover', e => e.preventDefault());
addEventListener('drop', e => {
  e.preventDefault();
  Array.from(e.dataTransfer.files).forEach(f => {
    if (f.type.startsWith('audio/'))
      audioSys.tracks.push({ name: f.name.replace(/\.[^/.]+$/, ''), url: URL.createObjectURL(f) });
  });
  shuffleTracks(); renderTracks();
  if (audioSys.idx === -1 && audioSys.tracks.length) { loadTrack(0); playAudio(); }
});

// ========== SERVICE WORKER REGISTRATION ==========
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(reg => {
    console.log('[PWA] Service Worker registered', reg.scope);
    // After SW activates, send cache request for music
    if (reg.active) {
      fetch('tracks.json').then(r => r.json()).then(tracks => {
        reg.active.postMessage({ type: 'CACHE_MUSIC', tracks });
      }).catch(() => {});
    }
  }).catch(err => console.log('[PWA] SW registration failed', err));
}
</script>
